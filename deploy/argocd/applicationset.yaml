apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: video-demo
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: cnpg-cluster
            path: deploy/infra/cnpg-cluster
            wave: "1"
          - name: redis
            wave: "2"
            chartRepo: https://charts.bitnami.com/bitnami
            chart: redis
            chartVersion: "23.2.12"
            helmValues:
              architecture: standalone
              auth:
                enabled: true
                existingSecret: redis-password
                existingSecretPasswordKey: redis-password
              master:
                persistence:
                  size: 512Mi
              commonAnnotations:
                argocd.argoproj.io/sync-wave: "2"
          - name: minio
            wave: "3"
            chartRepo: https://charts.min.io/
            chart: minio
            chartVersion: "5.4.0"
            helmValues:
              mode: standalone
              replicas: 1
              persistence:
                size: 1Gi
              existingSecret: minio-creds
              buckets:
                - name: video-demo
                  policy: none
                  purge: false
              resources:
                requests:
                  memory: 256Mi
              commonAnnotations:
                argocd.argoproj.io/sync-wave: "3"
          - name: video-demo-api
            path: deploy/app
            wave: "4"
            valuesFile: deploy/app/values-api.yaml
          - name: video-demo-worker
            path: deploy/app
            wave: "5"
            valuesFile: deploy/app/values-worker.yaml
          - name: video-demo-web
            path: deploy/app
            wave: "6"
            valuesFile: deploy/web/values-web.yaml
  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: wave
              operator: In
              values: ["1"]
        - matchExpressions:
            - key: wave
              operator: In
              values: ["2"]
        - matchExpressions:
            - key: wave
              operator: In
              values: ["3"]
        - matchExpressions:
            - key: wave
              operator: In
              values: ["4"]
        - matchExpressions:
            - key: wave
              operator: In
              values: ["5"]
        - matchExpressions:
            - key: wave
              operator: In
              values: ["6"]
  template:
    metadata:
      name: '{{ .name }}'
      namespace: argocd
      labels:
        app.kubernetes.io/part-of: video-demo
        wave: '{{ .wave }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: demo
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
  templatePatch: |
    spec:
      {{- if index . "chartRepo" }}
      source:
        repoURL: '{{ .chartRepo }}'
        chart: '{{ .chart }}'
        targetRevision: '{{ .chartVersion }}'
        helm:
          releaseName: '{{ .name }}'
          valuesObject:
            {{- .helmValues | toYaml | nindent 12 }}
      {{- else if index . "valuesFile" }}
      sources:
        - repoURL: https://github.com/GiladTrachtenberg/python-server-infra.git
          targetRevision: HEAD
          path: '{{ .path }}'
          helm:
            releaseName: '{{ .name }}'
            valueFiles:
              - '$values/{{ .valuesFile }}'
        - repoURL: https://github.com/GiladTrachtenberg/python-server-adge.git
          targetRevision: HEAD
          ref: values
      {{- else }}
      source:
        repoURL: https://github.com/GiladTrachtenberg/python-server-infra.git
        targetRevision: HEAD
        path: '{{ .path }}'
      {{- end }}
