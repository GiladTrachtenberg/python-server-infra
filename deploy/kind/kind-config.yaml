kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8082
        protocol: TCP
      - containerPort: 30443
        hostPort: 9443
        protocol: TCP
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
