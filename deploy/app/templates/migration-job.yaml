{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "video-demo.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "video-demo.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "video-demo.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["aerich"]
          args: ["upgrade"]
          {{- if or .Values.configMap.enabled .Values.sealedSecret.enabled .Values.sharedSecrets }}
          envFrom:
            {{- if .Values.configMap.enabled }}
            - configMapRef:
                name: {{ include "video-demo.fullname" . }}-config
            {{- end }}
            {{- range .Values.sharedSecrets }}
            - secretRef:
                name: {{ . }}
            {{- end }}
            {{- if .Values.sealedSecret.enabled }}
            - secretRef:
                name: {{ include "video-demo.fullname" . }}-secrets
            {{- end }}
          {{- end }}
{{- end }}
